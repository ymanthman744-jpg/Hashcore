<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
}

.box {
  background: #222;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin-top: 10px;
  border: none;
  background: green;
  color: white;
  border-radius: 5px;
}

input {
  padding: 10px;
  width: 80%;
}
</style>

</head>

<body>

<h2>👋 لوحة التحكم</h2>

<div class="box">
  <h3>💰 الرصيد</h3>
  <p id="balance">0</p>
</div>

<div class="box">
  <h3>👥 عدد الدعوات</h3>
  <p id="refs">0</p>
</div>

<div class="box">
  <h3>💸 أرباح الدعوات</h3>
  <p id="bonus">0</p>
</div>

<div class="box">
  <h3>🔗 رابط الدعوة</h3>
  <p id="refLink"></p>
  <button onclick="copyRef()">نسخ الرابط</button>
</div>

<div class="box">
  <h3>📈 استثمار</h3>
  <input id="amount" placeholder="ادخل المبلغ"><br><br>
  <button onclick="invest()">استثمار</button>
</div>

<div class="box">
  <h3>💳 شحن الرصيد</h3>
  <input id="depositAmount" placeholder="ادخل المبلغ"><br><br>
  <button onclick="deposit()">شحن</button>
</div>

<script>

// حماية الصفحة
let user = localStorage.getItem("user");
if (!user) {
  window.location.href = "/login.html";
}

// رابط الدعوة
let link = window.location.origin + "/register.html?ref=" + user;
document.getElementById("refLink").innerText = link;

// نسخ الرابط
function copyRef() {
  navigator.clipboard.writeText(link);
  alert("تم النسخ");
}

// تحميل البيانات
function loadData() {
  fetch("/get-user", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ username: user })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      document.getElementById("balance").innerText = data.user.balance;
      document.getElementById("refs").innerText = data.referralsCount;
      document.getElementById("bonus").innerText = data.totalBonus.toFixed(2);
    }
  });
}

// استثمار
function invest() {
  let amount = document.getElementById("amount").value;

  fetch("/invest", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: user,
      amount: Number(amount)
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("تم الاستثمار");
      loadData();
    } else {
      alert("خطأ");
    }
  });
}

// شحن
function deposit() {
  let amount = document.getElementById("depositAmount").value;

  fetch("/deposit", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: user,
      amount: Number(amount)
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      alert("تم الشحن");
      loadData();
    } else {
      alert("خطأ");
    }
  });
}

// تشغيل
loadData();

</script>

</body>
</html>
