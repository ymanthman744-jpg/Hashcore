<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: Arial;
}
input {
  padding: 10px;
  margin: 10px;
  width: 80%;
}
button {
  padding: 10px;
  background: green;
  color: white;
  border: none;
}
</style>

</head>

<body>

<h2>🔐 تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم"><br>
<input id="password" type="password" placeholder="كلمة المرور"><br>

<button onclick="login()">دخول</button>

<p>ما عندك حساب؟ <a href="/register.html">سجل</a></p>

<script>

function login() {

  let username = document.getElementById("username").value;
  let password = document.getElementById("password").value;

  fetch("/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      password: password
    })
  })
  .then(res => res.json())
  .then(data => {

    if (data.success) {
      localStorage.setItem("user", username);
      window.location.href = "/dashboard.html";
    } else {
      alert("بيانات غلط");
    }

  });

}

</script>

</body>
</html>
